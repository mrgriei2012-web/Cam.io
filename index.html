<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv5 Pro Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #v { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; z-index: 1; }
        #c { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; z-index: 2; pointer-events: none; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const v = document.getElementById('v'), c = document.getElementById('c');
        const ctx = c.getContext('2d');
        
        // Словарь для перевода на русский
        const labelsRU = {
            'person': 'Человек', 'laptop': 'Ноутбук', 'cell phone': 'Телефон',
            'chair': 'Стул', 'book': 'Книга', 'bottle': 'Бутылка',
            'bed': 'Кровать', 'cup': 'Чашка', 'mouse': 'Мышь', 'tv': 'Телевизор',
            'remote': 'Пульт', 'keyboard': 'Клавиатура', 'adapter': 'Зарядка'
        };

        async function init() {
            // 1. Подключение камеры
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            
            // 2. Загрузка модели (используем проверенную библиотеку)
            const model = await cocoSsd.load();
            
            function detect() {
                model.detect(v).then(preds => {
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    ctx.clearRect(0, 0, c.width, c.height);

                    // Сетка (линии)
                    if (preds.length > 1) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                        for (let i = 0; i < preds.length; i++) {
                            const [x, y, w, h] = preds[i].bbox;
                            if (i === 0) ctx.moveTo(x + w/2, y + h/2);
                            else ctx.lineTo(x + w/2, y + h/2);
                        }
                        ctx.stroke();
                    }

                    // Объекты
                    preds.forEach(p => {
                        const [x, y, w, h] = p.bbox;
                        ctx.strokeStyle = '#FFF'; ctx.strokeRect(x, y, w, h);
                        ctx.fillStyle = '#FFF'; ctx.font = '20px Arial';
                        // Перевод: если есть в словаре - пишем русское, если нет - английское
                        ctx.fillText(labelsRU[p.class] || p.class, x, y - 5);
                    });
                    requestAnimationFrame(detect);
                });
            }
            detect();
        }
        init();
    </script>
</body>
</html>
