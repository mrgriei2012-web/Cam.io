<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Camera</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #v, #c { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; object-fit: cover;
            transform-origin: center center;
        }
        #zoomRange {
            position: absolute; bottom: 30px; left: 10%; width: 80%;
            z-index: 100;
        }
    </style>
</head>
<body>
    <input type="range" id="zoomRange" min="0.5" max="3.0" step="0.1" value="1.0">
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const zoomRange = document.getElementById('zoomRange');
        const v = document.getElementById('v'), c = document.getElementById('c');
        const ctx = c.getContext('2d');

        // Управление зумом
        zoomRange.oninput = () => {
            const val = zoomRange.value;
            v.style.transform = `scale(${val})`;
            c.style.transform = `scale(${val})`;
        };

        async function run() {
            // Подключаем заднюю камеру
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } 
                });
                v.srcObject = stream;
            } catch (e) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                v.srcObject = stream;
            }

            const model = await cocoSsd.load();
            
            function detect() {
                model.detect(v).then(preds => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    ctx.clearRect(0, 0, c.width, c.height);
                    
                    preds.forEach(p => {
                        // Порог уверенности 70% чтобы не было лишних рамок
                        if (p.score > 0.7) {
                            ctx.strokeStyle = '#00FF00';
                            ctx.lineWidth = 4;
                            ctx.strokeRect(...p.bbox);
                            ctx.fillStyle = '#00FF00';
                            ctx.font = '20px Arial';
                            ctx.fillText(p.class, p.bbox[0], p.bbox[1] - 10);
                        }
                    });
                    requestAnimationFrame(detect);
                });
            }
            detect();
        }
        run();
    </script>
</body>
</html>
