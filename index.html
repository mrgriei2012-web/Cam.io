<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Grid Effect</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #fff; }
        /* contain показывает весь кадр целиком */
        #v, #c { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: contain; 
            transform-origin: center center;
            filter: brightness(0.8) contrast(1.2);
        }
        #zoomRange { position: absolute; bottom: 30px; left: 10%; width: 80%; z-index: 100; }
    </style>
</head>
<body>
    <input type="range" id="zoomRange" min="0.5" max="2.0" step="0.1" value="1.0">
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const v = document.getElementById('v'), c = document.getElementById('c');
        const zoom = document.getElementById('zoomRange');
        const ctx = c.getContext('2d');

        zoom.oninput = () => {
            v.style.transform = `scale(${zoom.value})`;
            c.style.transform = `scale(${zoom.value})`;
        };

        async function run() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } 
                });
                v.srcObject = stream;
                const model = await cocoSsd.load();

                function detect() {
                    model.detect(v).then(preds => {
                        c.width = v.videoWidth;
                        c.height = v.videoHeight;
                        ctx.clearRect(0, 0, c.width, c.height);
                        
                        // Берем только уверенные объекты
                        const objects = preds.filter(p => p.score > 0.5);

                        // 1. Рисуем сетку (линии между объектами)
                        if (objects.length > 1) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                            ctx.lineWidth = 2;
                            
                            for (let i = 0; i < objects.length; i++) {
                                const [x, y, w, h] = objects[i].bbox;
                                const cx = x + w / 2;
                                const cy = y + h / 2;
                                
                                if (i === 0) ctx.moveTo(cx, cy);
                                else ctx.lineTo(cx, cy);
                            }
                            ctx.stroke();
                        }

                        // 2. Рисуем точки и названия
                        objects.forEach(p => {
                            const [x, y, w, h] = p.bbox;
                            const cx = x + w / 2;
                            const cy = y + h / 2;
                            
                            // Точка
                            ctx.fillStyle = '#FFFFFF';
                            ctx.beginPath();
                            ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
                            ctx.fill();
                            
                            // Текст
                            ctx.font = 'bold 20px Arial';
                            ctx.fillText(p.class, x, y - 10);
                        });
                        
                        requestAnimationFrame(detect);
                    });
                }
                detect();
            } catch (err) {
                console.error("Ошибка камеры:", err);
            }
        }
        run();
    </script>
</body>
</html>
