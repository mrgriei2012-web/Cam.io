<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Camera 1x</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        /* object-fit: contain ПОКАЗЫВАЕТ ВЕСЬ КАДР целиком без приближения */
        #v, #c { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: contain; 
            transform-origin: center center;
        }
        #status { position: absolute; top: 50%; width: 100%; z-index: 99; }
        #zoomRange { position: absolute; bottom: 30px; left: 10%; width: 80%; z-index: 100; }
    </style>
</head>
<body>
    <div id="status">Загрузка системы...</div>
    <input type="range" id="zoomRange" min="0.5" max="2.0" step="0.1" value="1.0">
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const status = document.getElementById('status');
        const v = document.getElementById('v'), c = document.getElementById('c');
        const zoomRange = document.getElementById('zoomRange');

        zoomRange.oninput = () => {
            v.style.transform = `scale(${zoomRange.value})`;
            c.style.transform = `scale(${zoomRange.value})`;
        };

        async function init() {
            try {
                status.innerText = "Подключение камеры...";
                // Запрашиваем основную камеру
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: { exact: "environment" },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                });
                v.srcObject = stream;
                
                status.innerText = "Загрузка нейросети...";
                const model = await cocoSsd.load();
                
                status.innerText = ""; // Убираем статус
                
                function detect() {
                    model.detect(v).then(preds => {
                        const ctx = c.getContext('2d');
                        c.width = v.videoWidth; 
                        c.height = v.videoHeight;
                        ctx.clearRect(0, 0, c.width, c.height);
                        
                        preds.forEach(p => {
                            if (p.score > 0.6) {
                                ctx.strokeStyle = '#00FF00';
                                ctx.lineWidth = 3;
                                ctx.strokeRect(...p.bbox);
                                ctx.fillStyle = '#00FF00';
                                ctx.fillText(p.class, p.bbox[0], p.bbox[1] - 5);
                            }
                        });
                        requestAnimationFrame(detect);
                    });
                }
                detect();
            } catch (err) {
                status.innerText = "Ошибка доступа: " + err.message;
            }
        }
        init();
    </script>
</body>
</html>
