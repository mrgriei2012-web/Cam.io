<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #v { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: contain; 
            z-index: 1;
            filter: brightness(0.8) contrast(1.2);
        }
        #c { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: contain; 
            z-index: 2;
            pointer-events: none; /* Чтобы касания проходили сквозь холст */
        }
        #zoomRange { 
            position: absolute; bottom: 30px; left: 10%; width: 80%; 
            z-index: 100; 
        }
    </style>
</head>
<body>
    <input type="range" id="zoomRange" min="0.5" max="2.0" step="0.1" value="1.0">
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const v = document.getElementById('v'), c = document.getElementById('c');
        const zoom = document.getElementById('zoomRange');
        const ctx = c.getContext('2d');

        zoom.oninput = () => {
            v.style.transform = `scale(${zoom.value})`;
            c.style.transform = `scale(${zoom.value})`;
        };

        async function run() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: { exact: "environment" } } 
                });
                v.srcObject = stream;
                
                const model = await cocoSsd.load();

                function detect() {
                    model.detect(v).then(preds => {
                        // Подгоняем размер холста под реальный поток
                        c.width = v.videoWidth;
                        c.height = v.videoHeight;
                        ctx.clearRect(0, 0, c.width, c.height);
                        
                        const objects = preds.filter(p => p.score > 0.4);

                        // 1. Рисуем сетку (линии)
                        if (objects.length > 1) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                            ctx.lineWidth = 2;
                            for (let i = 0; i < objects.length; i++) {
                                const [x, y, w, h] = objects[i].bbox;
                                const cx = x + w / 2;
                                const cy = y + h / 2;
                                if (i === 0) ctx.moveTo(cx, cy);
                                else ctx.lineTo(cx, cy);
                            }
                            ctx.stroke();
                        }

                        // 2. Рисуем рамки и текст
                        objects.forEach(p => {
                            const [x, y, w, h] = p.bbox;
                            
                            // Рамка
                            ctx.strokeStyle = '#FFFFFF';
                            ctx.lineWidth = 4;
                            ctx.strokeRect(x, y, w, h);
                            
                            // Текст
                            ctx.fillStyle = '#FFFFFF';
                            ctx.font = 'bold 24px Arial';
                            ctx.fillText(p.class, x, y - 10);
                        });
                        
                        requestAnimationFrame(detect);
                    });
                }
                detect();
            } catch (err) {
                console.error("Ошибка:", err);
            }
        }
        run();
    </script>
</body>
</html>
