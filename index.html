<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #v, #c { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            object-fit: contain; /* Чтобы видеть кадр целиком */
            transform-origin: center center;
        }
        #zoomRange { position: absolute; bottom: 30px; left: 10%; width: 80%; z-index: 100; }
    </style>
</head>
<body>
    <input type="range" id="zoomRange" min="0.5" max="2.0" step="0.1" value="1.0">
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const v = document.getElementById('v'), c = document.getElementById('c');
        const zoom = document.getElementById('zoomRange');
        const ctx = c.getContext('2d');

        zoom.oninput = () => {
            v.style.transform = `scale(${zoom.value})`;
            c.style.transform = `scale(${zoom.value})`;
        };

        async function run() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
            v.srcObject = stream;
            const model = await cocoSsd.load();

            function detect() {
                model.detect(v).then(preds => {
                    // Устанавливаем размеры холста равными размерам видеопотока
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    ctx.clearRect(0, 0, c.width, c.height);
                    
                    preds.forEach(p => {
                        if (p.score > 0.5) {
                            // 1. Рисуем рамку
                            ctx.strokeStyle = '#00FF00';
                            ctx.lineWidth = 6; // Сделал толще для видимости
                            ctx.strokeRect(...p.bbox);
                            
                            // 2. Добавляем текст и фон для него
                            ctx.fillStyle = '#00FF00';
                            ctx.font = 'bold 30px Arial';
                            const text = `${p.class} (${Math.round(p.score*100)}%)`;
                            
                            // Рисуем подпись над рамкой
                            ctx.fillText(text, p.bbox[0], p.bbox[1] > 30 ? p.bbox[1] - 10 : 30);
                            
                            // 3. Линия от верха (как вы просили)
                            ctx.beginPath();
                            ctx.moveTo(p.bbox[0] + p.bbox[2]/2, 0); // Центр рамки сверху
                            ctx.lineTo(p.bbox[0] + p.bbox[2]/2, p.bbox[1]);
                            ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }
                    });
                    requestAnimationFrame(detect);
                });
            }
            detect();
        }
        run();
    </script>
</body>
</html>
