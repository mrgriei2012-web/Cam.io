<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Scan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #v { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; z-index: 1; filter: brightness(0.7) contrast(1.3) grayscale(0.2); }
        #c { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; z-index: 2; pointer-events: none; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const v = document.getElementById('v'), c = document.getElementById('c');
        const ctx = c.getContext('2d');
        const labelsRU = {'person': 'Человек', 'laptop': 'Ноутбук', 'cell phone': 'Телефон', 'chair': 'Стул', 'book': 'Книга', 'bottle': 'Бутылка', 'bed': 'Кровать', 'cup': 'Чашка', 'tv': 'Монитор', 'mouse': 'Мышь', 'keyboard': 'Клавиатура'};

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            const model = await cocoSsd.load();

            function detect() {
                model.detect(v).then(preds => {
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    ctx.clearRect(0, 0, c.width, c.height);
                    
                    const objects = preds.filter(p => p.score > 0.5 && p.class !== 'toilet');

                    // 1. Стиль "Сетка" (как в видео)
                    if (objects.length > 1) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)'; // "Кибер" голубой цвет
                        ctx.lineWidth = 1.5;
                        for (let i = 0; i < objects.length; i++) {
                            const [x, y, w, h] = objects[i].bbox;
                            if (i === 0) ctx.moveTo(x + w/2, y + h/2);
                            else ctx.lineTo(x + w/2, y + h/2);
                        }
                        ctx.stroke();
                    }

                    // 2. Стиль "Маркеры" (точки вместо рамок)
                    objects.forEach(p => {
                        const [x, y, w, h] = p.bbox;
                        const cx = x + w/2, cy = y + h/2;
                        
                        // Точка
                        ctx.fillStyle = '#00FFFF';
                        ctx.beginPath();
                        ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Тонкий крестик вокруг точки
                        ctx.strokeStyle = '#00FFFF';
                        ctx.strokeRect(cx - 15, cy - 15, 30, 30);
                        
                        // Подпись
                        ctx.fillStyle = '#FFF';
                        ctx.font = '16px Monospace';
                        ctx.fillText(labelsRU[p.class] || p.class, cx + 20, cy);
                    });
                    requestAnimationFrame(detect);
                });
            }
            detect();
        }
        init();
    </script>
</body>
</html>
